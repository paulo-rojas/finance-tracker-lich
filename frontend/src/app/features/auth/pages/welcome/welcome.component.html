<div class="welcome-container">
  <mat-toolbar color="primary">
    <mat-icon class="mr-2">account_balance</mat-icon>
    <span>Finance Tracker</span>
    <span class="spacer"></span>
    <a mat-button routerLink="/login" class="hide-on-mobile">Iniciar sesion</a>
    <a mat-raised-button color="accent" routerLink="/register">Registrarse</a>
  </mat-toolbar>

  <main class="hero-section">
    <mat-card class="hero-card">
      <mat-card-header>
        <div mat-card-avatar>
          <mat-icon color="primary" class="avatar-icon">account_balance_wallet</mat-icon>
        </div>
        <mat-card-title>Bienvenido a tu futuro financiero</mat-card-title>
        <mat-card-subtitle>Toma el control hoy mismo</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content class="mt-3">
        <p>
          Gestiona tus ingresos, controla tus gastos diarios y alcanza tus metas
          financieras de forma sencilla, centralizada y segura.
        </p>
      </mat-card-content>

      <mat-card-actions align="end">
        <a mat-button color="primary" routerLink="/login">Saber mas</a>
        <a mat-flat-button color="primary" routerLink="/login">Comenzar ahora</a>
      </mat-card-actions>
    </mat-card>
  </main>
</div>
