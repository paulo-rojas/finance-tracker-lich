services:
  postgres:
    image: postgres:16
    container_name: finance-tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: finance_tracker
      POSTGRES_USER: finance_tracker
      POSTGRES_PASSWORD: finance_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance_tracker -d finance_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: finance-tracker-backend
    working_dir: /workspace/backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/finance_tracker
      SPRING_DATASOURCE_USERNAME: finance_tracker
      SPRING_DATASOURCE_PASSWORD: finance_tracker
    volumes:
      - ./backend:/workspace/backend
      - m2_cache:/root/.m2
    command: sh ./mvnw spring-boot:run
    ports:
      - "8080:8080"

  frontend:
    image: node:22-alpine
    container_name: finance-tracker-frontend
    working_dir: /workspace/frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/workspace/frontend
      - node_modules:/workspace/frontend/node_modules
    command: sh -c "npm install && npm start -- --host 0.0.0.0 --port 4200"
    ports:
      - "4200:4200"

  nginx:
    image: nginx:1.27-alpine
    container_name: finance-tracker-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  m2_cache:
  node_modules:
